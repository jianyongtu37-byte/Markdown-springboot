
spring.application.name=Markdown

# ?????
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# MySQL ???????
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:markdown_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
