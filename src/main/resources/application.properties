# ========== JWT ?? ==========
jwt.secret=${JWT_SECRET:markdown-knowledge-base-secret-key-2025-spring-boot-4.0.5-jwt-token-secret}
jwt.expiration=${JWT_EXPIRATION:86400}

# ========== DeepSeek AI ?? ==========
